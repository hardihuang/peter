<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. - Pomodoro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { width: 800px; height: 480px; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .container { width: 800px; height: 480px; display: grid; grid-template-rows: 44px 1fr 70px; padding: 8px; gap: 6px; }
        .header { border: 1px solid #0f0; padding: 4px 8px; display: flex; gap: 6px; align-items: center; }
        .nav-btn { border: 1px solid #0f0; padding: 6px 12px; cursor: pointer; font-size: 11px; min-height: 32px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(0,255,0,0.15); }
        .nav-btn.active { background: rgba(0,255,0,0.25); }
        .back-btn { margin-right: auto; min-width: 70px; }
        .main { border: 1px solid #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .timer-display { font-size: 100px; font-weight: bold; letter-spacing: 8px; text-shadow: 0 0 20px #0f0; }
        .timer-display.work { color: #0f0; }
        .timer-display.break { color: #0af; text-shadow: 0 0 20px #0af; }
        .timer-display.longbreak { color: #a0f; text-shadow: 0 0 20px #a0f; }
        .status { position: absolute; top: 10px; font-size: 14px; color: #080; letter-spacing: 3px; }
        .status.active { color: #0f0; }
        .sessions { position: absolute; bottom: 10px; font-size: 12px; color: #080; }
        .dot { display: inline-block; width: 12px; height: 12px; border: 1px solid #0f0; margin: 0 4px; border-radius: 50%; }
        .dot.done { background: #0f0; }
        .controls { display: flex; gap: 15px; margin-top: 15px; }
        .btn { border: 1px solid #0f0; padding: 12px 30px; cursor: pointer; font-size: 14px; min-width: 100px; text-align: center; }
        .btn:hover { background: rgba(0,255,0,0.15); }
        .btn.primary { background: rgba(0,255,0,0.2); font-weight: bold; }
        .bottom { border: 1px solid #0f0; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
        .settings-row { display: flex; gap: 10px; align-items: center; justify-content: center; }
        .setting { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .setting label { font-size: 8px; color: #080; }
        .setting input { background: #000; border: 1px solid #050; color: #0f0; padding: 4px; font-family: 'Courier New', monospace; font-size: 12px; width: 40px; text-align: center; }
        .setting input:focus { border-color: #0f0; outline: none; }
        .sound-select { display: flex; gap: 6px; align-items: center; }
        .sound-select label { font-size: 8px; color: #080; }
        .sound-btn { border: 1px solid #050; padding: 4px 8px; cursor: pointer; font-size: 9px; background: #000; color: #0a0; }
        .sound-btn:hover { border-color: #0f0; color: #0f0; }
        .sound-btn.active { border-color: #0f0; background: rgba(0,255,0,0.2); color: #0f0; }
        .volume-control { display: flex; align-items: center; gap: 4px; }
        .volume-control label { font-size: 8px; color: #080; }
        .volume-slider { width: 60px; height: 4px; -webkit-appearance: none; background: #050; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #0f0; cursor: pointer; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.25); animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(480px); } }
        .notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #0f0; background: #000; padding: 40px 60px; font-size: 28px; display: none; z-index: 100; box-shadow: 0 0 40px rgba(0,255,0,0.5); }
        .notification.show { display: block; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="notification" id="notification">SESSION COMPLETE</div>
    <div class="container">
        <div class="header">
            <div class="nav-btn back-btn" onclick="location.href='index.html'">← BACK</div>
            <div class="nav-btn active" onclick="setMode('work')" id="btn-work">WORK</div>
            <div class="nav-btn" onclick="setMode('short')" id="btn-short">SHORT</div>
            <div class="nav-btn" onclick="setMode('long')" id="btn-long">LONG</div>
            <div class="nav-btn" onclick="resetTimer()">RESET</div>
        </div>
        <div class="main">
            <div class="status" id="status">READY</div>
            <div class="timer-display work" id="timer">25:00</div>
            <div class="controls">
                <div class="btn primary" onclick="toggleTimer()" id="btn-main">START</div>
                <div class="btn" onclick="skipSession()">SKIP</div>
            </div>
            <div class="sessions" id="sessions">Sessions: <span id="dots"></span></div>
        </div>
        <div class="bottom">
            <div class="settings-row">
                <div class="setting"><label>WORK</label><input type="number" id="work-time" value="25" min="1" max="60" onchange="updateTimes()"></div>
                <div class="setting"><label>SHORT</label><input type="number" id="short-time" value="5" min="1" max="30" onchange="updateTimes()"></div>
                <div class="setting"><label>LONG</label><input type="number" id="long-time" value="15" min="1" max="60" onchange="updateTimes()"></div>
                <div class="setting"><label>COUNT</label><input type="number" id="sessions-before-long" value="4" min="2" max="10" onchange="updateTimes()"></div>
            </div>
            <div class="settings-row">
                <div class="sound-select">
                    <label>BGM:</label>
                    <div class="sound-btn" onclick="selectBgSound('none')" id="bg-sound-none">NONE</div>
                    <div class="sound-btn active" onclick="selectBgSound('water')" id="bg-sound-water">WATER</div>
                    <div class="sound-btn" onclick="selectBgSound('fire')" id="bg-sound-fire">FIRE</div>
                </div>
                <div class="sound-select">
                    <label>TICK:</label>
                    <div class="sound-btn" onclick="toggleTick(false)" id="tick-off">OFF</div>
                    <div class="sound-btn active" onclick="toggleTick(true)" id="tick-on">ON</div>
                </div>
                <div class="volume-control">
                    <label>VOL:</label>
                    <input type="range" class="volume-slider" id="volume" min="0" max="100" value="40" onchange="updateVolume()">
                </div>
            </div>
        </div>
    </div>
    <script>
        let timeLeft = 25 * 60, totalTime = 25 * 60, isRunning = false, currentMode = 'work', sessionCount = 0, timerInterval = null;
        let workMinutes = 25, shortMinutes = 5, longMinutes = 15, sessionsBeforeLong = 4;
        let currentBgSound = 'water', tickEnabled = true, bgAudio = null, tickAudio = null, volume = 0.4;
        
        // Sound library
        const sounds = {
            tick: { src: 'sounds/tick.mp3' },
            water: { src: 'sounds/water.mp3' },
            fire: { src: 'sounds/forest.mp3' }
        };
        
        const savedBrightness = localStorage.getItem('brightness');
        if (savedBrightness) document.body.style.filter = `brightness(${0.3 + (parseInt(savedBrightness) / 100) * 0.7})`;
        
        // Load saved sound preferences
        const savedBgSound = localStorage.getItem('pomodoro-bg-sound');
        const savedTickEnabled = localStorage.getItem('pomodoro-tick');
        const savedVolume = localStorage.getItem('pomodoro-volume');
        if (savedBgSound && sounds[savedBgSound]) {
            currentBgSound = savedBgSound;
        }
        if (savedTickEnabled !== null) {
            tickEnabled = savedTickEnabled === 'true';
        }
        if (savedVolume !== null) {
            volume = parseInt(savedVolume) / 100;
            document.getElementById('volume').value = parseInt(savedVolume);
        }
        
        function formatTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`; }
        function updateDisplay() { document.getElementById('timer').textContent = formatTime(timeLeft); document.title = `F.R.I.D.A.Y. - ${formatTime(timeLeft)}`; }
        function updateDots() { let dots = ''; for (let i = 0; i < sessionsBeforeLong; i++) dots += `<span class="dot ${i < sessionCount ? 'done' : ''}"></span>`; document.getElementById('dots').innerHTML = dots; }
        
        function selectBgSound(soundName) {
            if (isRunning) stopBgSound();
            currentBgSound = soundName;
            localStorage.setItem('pomodoro-bg-sound', soundName);
            updateSoundUI();
            if (isRunning) playBgSound();
        }
        
        function toggleTick(enabled) {
            tickEnabled = enabled;
            localStorage.setItem('pomodoro-tick', enabled);
            updateSoundUI();
            if (!enabled && tickAudio) {
                tickAudio.pause();
                tickAudio = null;
            }
        }
        
        function updateSoundUI() {
            ['none', 'water', 'fire'].forEach(s => {
                document.getElementById('bg-sound-' + s).classList.remove('active');
            });
            document.getElementById('bg-sound-' + currentBgSound).classList.add('active');
            document.getElementById('tick-off').classList.toggle('active', !tickEnabled);
            document.getElementById('tick-on').classList.toggle('active', tickEnabled);
        }
        
        function updateVolume() {
            const vol = parseInt(document.getElementById('volume').value);
            volume = vol / 100;
            localStorage.setItem('pomodoro-volume', vol);
            if (bgAudio) bgAudio.volume = volume;
        }
        
        function playBgSound() {
            if (currentBgSound === 'none') return;
            stopBgSound();
            bgAudio = new Audio(sounds[currentBgSound].src);
            bgAudio.volume = volume;
            bgAudio.loop = true;
            bgAudio.play().catch(() => {});
        }
        
        function stopBgSound() {
            if (bgAudio) {
                bgAudio.pause();
                bgAudio.currentTime = 0;
                bgAudio = null;
            }
        }
        
        function playTick() {
            if (!tickEnabled) return;
            tickAudio = new Audio(sounds.tick.src);
            tickAudio.volume = volume * 0.7;
            tickAudio.play().catch(() => {});
        }
        
        function setMode(mode) {
            if (isRunning && !confirm('Switch mode? Timer will reset.')) return;
            stopTimer(); currentMode = mode;
            ['work','short','long'].forEach(m => document.getElementById('btn-' + m).classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            const timerEl = document.getElementById('timer'); timerEl.className = 'timer-display';
            const statusEl = document.getElementById('status');
            if (mode === 'work') { totalTime = workMinutes * 60; timerEl.classList.add('work'); statusEl.textContent = 'WORK SESSION'; }
            else if (mode === 'short') { totalTime = shortMinutes * 60; timerEl.classList.add('break'); statusEl.textContent = 'SHORT BREAK'; }
            else { totalTime = longMinutes * 60; timerEl.classList.add('longbreak'); statusEl.textContent = 'LONG BREAK'; }
            timeLeft = totalTime; updateDisplay();
        }
        
        function toggleTimer() {
            if (isRunning) stopTimer(); else startTimer();
        }
        
        function startTimer() {
            isRunning = true; document.getElementById('btn-main').textContent = 'PAUSE'; document.getElementById('status').classList.add('active');
            playBgSound();
            timerInterval = setInterval(() => {
                timeLeft--; updateDisplay();
                playTick();
                if (timeLeft <= 0) completeSession();
            }, 1000);
        }
        
        function stopTimer() {
            isRunning = false; clearInterval(timerInterval); document.getElementById('btn-main').textContent = 'START'; document.getElementById('status').classList.remove('active');
            stopBgSound();
        }
        
        function resetTimer() {
            stopTimer(); timeLeft = totalTime; updateDisplay();
        }
        
        function completeSession() {
            stopTimer(); showNotification('SESSION COMPLETE');
            if (currentMode === 'work') {
                sessionCount++;
                if (sessionCount >= sessionsBeforeLong) { sessionCount = 0; setTimeout(() => setMode('long'), 2000); }
                else setTimeout(() => setMode('short'), 2000);
            } else setTimeout(() => setMode('work'), 2000);
            updateDots();
        }
        
        function skipSession() {
            if (isRunning) stopTimer();
            if (currentMode === 'work') {
                sessionCount++;
                if (sessionCount >= sessionsBeforeLong) { sessionCount = 0; setMode('long'); }
                else setMode('short');
            } else setMode('work');
            updateDots();
        }
        
        function showNotification(text) {
            const n = document.getElementById('notification'); n.textContent = text; n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }
        
        function updateTimes() {
            workMinutes = parseInt(document.getElementById('work-time').value) || 25;
            shortMinutes = parseInt(document.getElementById('short-time').value) || 5;
            longMinutes = parseInt(document.getElementById('long-time').value) || 15;
            sessionsBeforeLong = parseInt(document.getElementById('sessions-before-long').value) || 4;
            if (!isRunning) { setMode(currentMode); updateDots(); }
        }
        
        updateDots();
        updateSoundUI();
    </script>
</body>
</html>
