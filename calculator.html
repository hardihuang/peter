<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. - Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { width: 800px; height: 480px; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .container { width: 800px; height: 480px; display: grid; grid-template-rows: 44px 1fr; padding: 8px; gap: 6px; }
        .header { border: 1px solid #0f0; padding: 4px 8px; display: flex; gap: 6px; align-items: center; }
        .nav-btn { border: 1px solid #0f0; padding: 6px 12px; cursor: pointer; font-size: 11px; min-height: 32px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(0,255,0,0.15); }
        .nav-btn.active { background: rgba(0,255,0,0.25); }
        .back-btn { margin-right: auto; min-width: 70px; }
        .main { border: 1px solid #0f0; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
        
        .display { border: 1px solid #0f0; padding: 10px; text-align: right; height: 70px; }
        .display-history { font-size: 12px; color: #080; margin-bottom: 2px; min-height: 16px; }
        .display-main { font-size: 36px; font-weight: bold; letter-spacing: 2px; }
        .display-sub { font-size: 10px; color: #0a0; margin-top: 2px; }
        
        .keypad { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .key { border: 1px solid #050; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .key:hover { border-color: #0a0; background: rgba(0,255,0,0.05); }
        .key:active { border-color: #0f0; background: rgba(0,255,0,0.15); }
        .key.num { font-size: 24px; }
        .key.op { border-color: #0a0; }
        .key.eq { border-color: #0f0; background: rgba(0,255,0,0.1); font-weight: bold; }
        .key.fn { font-size: 14px; color: #0a0; }
        .key.clear { border-color: #fa0; color: #fa0; }
        .key.del { border-color: #f55; color: #f55; }
        .key.wide { grid-column: span 2; }
        
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.25); animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(480px); } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="header">
            <div class="nav-btn back-btn" onclick="location.href='index.html'">← BACK</div>
            <div class="nav-btn active" onclick="setMode('basic')" id="btn-basic">BASIC</div>
            <div class="nav-btn" onclick="setMode('scientific')" id="btn-scientific">SCI</div>
            <div class="nav-btn" onclick="setMode('programmer')" id="btn-programmer">PROG</div>
            <div class="nav-btn" onclick="clearAll()">CLR</div>
        </div>
        <div class="main">
            <div class="display">
                <div class="display-history" id="history"></div>
                <div class="display-main" id="main">0</div>
                <div class="display-sub" id="sub">BASIC MODE</div>
            </div>
            <div class="keypad" id="keypad"></div>
        </div>
    </div>
    <script>
        let current = '0', history = '', mode = 'basic', lastOp = null;
        
        const savedBrightness = localStorage.getItem('brightness');
        if (savedBrightness) document.body.style.filter = `brightness(${0.3 + (parseInt(savedBrightness) / 100) * 0.7})`;
        
        const layouts = {
            basic: [
                ['C', '⌫', '÷', '×'],
                ['7', '8', '9', '−'],
                ['4', '5', '6', '+'],
                ['1', '2', '3', '='],
                ['0', '.', '%', '=']
            ],
            scientific: [
                ['sin', 'cos', 'tan', 'log'],
                ['√', 'x^y', 'π', 'ln'],
                ['7', '8', '9', '÷'],
                ['4', '5', '6', '×'],
                ['1', '2', '3', '−'],
                ['0', '.', '=', '+']
            ],
            programmer: [
                ['HEX', 'BIN', 'OCT', 'DEC'],
                ['AND', 'OR', 'XOR', 'NOT'],
                ['7', '8', '9', '÷'],
                ['4', '5', '6', '×'],
                ['1', '2', '3', '−'],
                ['0', '.', '=', '+']
            ]
        };
        
        function renderKeypad() {
            const keypad = document.getElementById('keypad');
            keypad.innerHTML = '';
            const layout = layouts[mode];
            
            layout.forEach((row, rowIdx) => {
                row.forEach((key, colIdx) => {
                    if (rowIdx === 4 && colIdx === 3 && mode === 'basic') return; // Skip duplicate =
                    
                    const div = document.createElement('div');
                    div.className = 'key';
                    div.textContent = key;
                    
                    if (key >= '0' && key <= '9') div.classList.add('num');
                    else if (['+', '−', '×', '÷', '='].includes(key)) div.classList.add('op');
                    else if (key === '=') div.classList.add('eq');
                    else if (key === 'C') div.classList.add('clear');
                    else if (key === '⌫') div.classList.add('del');
                    else div.classList.add('fn');
                    
                    if (key === '0' && mode === 'basic') div.classList.add('wide');
                    
                    div.onclick = () => handleKey(key);
                    keypad.appendChild(div);
                });
            });
        }
        
        function handleKey(key) {
            if (key >= '0' && key <= '9') num(key);
            else if (key === '.') num('.');
            else if (['+', '−', '×', '÷'].includes(key)) op(key);
            else if (key === '=') calc();
            else if (key === 'C' || key === 'AC') clearAll();
            else if (key === '⌫') del();
            else if (key === '%') fn('percent');
            else fn(key.toLowerCase());
        }
        
        function setMode(m) {
            mode = m;
            ['basic', 'scientific', 'programmer'].forEach(x => document.getElementById('btn-' + x).classList.remove('active'));
            document.getElementById('btn-' + m).classList.add('active');
            document.getElementById('sub').textContent = m.toUpperCase() + ' MODE';
            renderKeypad();
        }
        
        function num(n) {
            if (current === '0' && n !== '.') current = '';
            if (n === '.' && current.includes('.')) return;
            current += n;
            updateDisplay();
        }
        
        function op(o) {
            if (lastOp) calc();
            history = current + ' ' + o + ' ';
            lastOp = o;
            current = '0';
            updateDisplay();
        }
        
        function fn(f) {
            const val = parseFloat(current) || 0;
            let result = val;
            switch(f) {
                case 'sin': result = Math.sin(val); break;
                case 'cos': result = Math.cos(val); break;
                case 'tan': result = Math.tan(val); break;
                case 'log': result = Math.log10(val); break;
                case 'ln': result = Math.log(val); break;
                case 'sqrt': result = Math.sqrt(val); break;
                case 'pow': history = current + '^'; lastOp = '^'; current = '0'; updateDisplay(); return;
                case 'pi': result = Math.PI; break;
                case 'e': result = Math.E; break;
                case 'percent': result = val / 100; break;
                case 'hex': current = Math.floor(val).toString(16).toUpperCase(); updateDisplay(); return;
                case 'bin': current = Math.floor(val).toString(2); updateDisplay(); return;
                case 'oct': current = Math.floor(val).toString(8); updateDisplay(); return;
                case 'dec': current = val.toString(10); updateDisplay(); return;
            }
            current = formatResult(result);
            updateDisplay();
        }
        
        function calc() {
            if (!lastOp) return;
            try {
                let expr = history + current;
                expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-').replace(/\^/g, '**');
                let result = eval(expr);
                history = '';
                lastOp = null;
                current = formatResult(result);
                updateDisplay();
            } catch(e) {
                current = 'Error';
                updateDisplay();
            }
        }
        
        function formatResult(n) {
            if (!isFinite(n)) return 'Error';
            let s = n.toString();
            if (s.length > 12) s = n.toExponential(6);
            return s;
        }
        
        function del() {
            if (current.length > 1) current = current.slice(0, -1);
            else current = '0';
            updateDisplay();
        }
        
        function clearAll() {
            current = '0';
            history = '';
            lastOp = null;
            updateDisplay();
        }
        
        function updateDisplay() {
            document.getElementById('main').textContent = current;
            document.getElementById('history').textContent = history;
        }
        
        renderKeypad();
    </script>
</body>
</html>
