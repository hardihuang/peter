<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y. - Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 800px; height: 480px; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 11px; }
        .container { width: 800px; height: 480px; display: grid; grid-template-rows: 40px 1fr 40px; padding: 10px; gap: 8px; }
        
        /* Top Navigation */
        .header { border: 1px solid #0f0; padding: 6px 10px; display: flex; gap: 8px; align-items: center; }
        .nav-btn { border: 1px solid #0f0; padding: 4px 10px; cursor: pointer; font-size: 10px; }
        .nav-btn:hover { background: rgba(0,255,0,0.1); }
        .nav-btn.active { background: rgba(0,255,0,0.2); }
        .back-btn { margin-right: auto; }
        
        /* Main Settings Panel */
        .main { border: 1px solid #0f0; padding: 8px; overflow-y: auto; }
        .settings-list { display: flex; flex-direction: column; gap: 4px; }
        .setting-row { 
            display: grid; 
            grid-template-columns: 30px 1fr 150px; 
            align-items: center; 
            border: 1px solid #050; 
            padding: 6px 8px;
            cursor: pointer;
            min-height: 32px;
        }
        .setting-row:hover { border-color: #0f0; background: rgba(0,255,0,0.05); }
        .setting-row.selected { border-color: #0f0; background: rgba(0,255,0,0.1); }
        
        /* Checkbox/Radio indicator */
        .indicator { 
            width: 14px; 
            height: 14px; 
            border: 1px solid #0f0; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 10px;
        }
        .indicator.checked::after { content: '*'; }
        .indicator.radio { border-radius: 50%; }
        
        /* Label and value */
        .setting-label { font-size: 10px; padding-left: 4px; }
        .setting-value { 
            text-align: right; 
            font-size: 9px; 
            color: #0a0;
        }
        
        /* Slider control */
        .slider-cell { 
            display: flex; 
            align-items: center; 
            gap: 6px;
        }
        .slider-track { 
            flex: 1; 
            height: 10px; 
            border: 1px solid #050; 
            position: relative;
            cursor: pointer;
        }
        .slider-fill { 
            height: 100%; 
            background: #0f0; 
            width: 50%;
        }
        .slider-text { font-size: 9px; min-width: 35px; text-align: right; }
        
        /* Section divider */
        .section-divider { 
            border-bottom: 1px solid #050; 
            margin: 8px 0 4px 0;
            padding-bottom: 2px;
            font-size: 8px; 
            color: #0a0;
        }
        
        /* Bottom buttons */
        .bottom { display: flex; gap: 8px; }
        .btn { 
            flex: 1; 
            border: 1px solid #0f0; 
            padding: 8px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 10px;
            text-transform: uppercase;
        }
        .btn:hover { background: rgba(0,255,0,0.1); }
        .btn.primary { background: rgba(0,255,0,0.15); }
        
        /* Scanline effect */
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.3); animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(480px); } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="header">
            <div class="nav-btn back-btn" onclick="window.location.href='index.html'">← BACK</div>
            <div class="nav-btn active">SETTINGS</div>
            <div class="nav-btn" onclick="alert('Terminal')">TERMINAL</div>
            <div class="nav-btn" onclick="alert('Restart')">RESTART</div>
            <div class="nav-btn" onclick="alert('Logs')">LOGS</div>
            <div class="nav-btn" onclick="alert('Files')">FILES</div>
        </div>
        
        <div class="main">
            <div class="settings-list">
                <div class="section-divider">SYSTEM</div>
                
                <div class="setting-row selected" onclick="selectRow(this)">
                    <div class="indicator checked">*</div>
                    <div class="setting-label">Auto-start on boot</div>
                    <div class="setting-value">ENABLED</div>
                </div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator"></div>
                    <div class="setting-label">SSH Server</div>
                    <div class="setting-value">RUNNING</div>
                </div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator checked">*</div>
                    <div class="setting-label">NTP Time Sync</div>
                    <div class="setting-value">ENABLED</div>
                </div>
                
                <div class="section-divider">DISPLAY</div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator"></div>
                    <div class="setting-label">Screen Brightness</div>
                    <div class="slider-cell">
                        <div class="slider-track" onclick="adjustSlider(this, event)">
                            <div class="slider-fill" style="width: 70%;"></div>
                        </div>
                        <span class="slider-text">70%</span>
                    </div>
                </div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator"></div>
                    <div class="setting-label">Screen Timeout</div>
                    <div class="slider-cell">
                        <div class="slider-track" onclick="adjustSlider(this, event)">
                            <div class="slider-fill" style="width: 30%;"></div>
                        </div>
                        <span class="slider-text">5min</span>
                    </div>
                </div>
                
                <div class="section-divider">AUDIO</div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator"></div>
                    <div class="setting-label">Master Volume</div>
                    <div class="slider-cell">
                        <div class="slider-track" onclick="adjustSlider(this, event)">
                            <div class="slider-fill" style="width: 50%;"></div>
                        </div>
                        <span class="slider-text">50%</span>
                    </div>
                </div>
                
                <div class="setting-row" onclick="toggleCheck(this)">
                    <div class="indicator checked">*</div>
                    <div class="setting-label">System Sounds</div>
                    <div class="setting-value">ON</div>
                </div>
                
                <div class="section-divider">NETWORK</div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator radio checked">*</div>
                    <div class="setting-label">WiFi Network</div>
                    <div class="setting-value">Connected</div>
                </div>
                
                <div class="setting-row" onclick="selectRow(this)">
                    <div class="indicator radio"></div>
                    <div class="setting-label">Ethernet</div>
                    <div class="setting-value">Disconnected</div>
                </div>
            </div>
        </div>
        
        <div class="bottom">
            <div class="btn" onclick="alert('Select')">SELECT</div>
            <div class="btn primary" onclick="alert('Enter')">ENTER</div>
        </div>
    </div>
    
    <script>
        function selectRow(row) {
            document.querySelectorAll('.setting-row').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
        }
        
        function toggleCheck(row) {
            const ind = row.querySelector('.indicator');
            if (ind.classList.contains('checked')) {
                ind.classList.remove('checked');
                ind.textContent = '';
            } else {
                ind.classList.add('checked');
                ind.textContent = '*';
            }
        }
        
        function adjustSlider(track, event) {
            const rect = track.getBoundingClientRect();
            const percent = Math.max(0, Math.min(100, ((event.clientX - rect.left) / rect.width) * 100));
            track.querySelector('.slider-fill').style.width = percent + '%';
            track.parentElement.querySelector('.slider-text').textContent = Math.round(percent) + '%';
        }
    </script>
</body>
</html>
