<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Smash Bros</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer { position: relative; margin-top: 20px; }
        canvas {
            border: 4px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
            image-rendering: pixelated;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .playerUI {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid;
        }
        .playerUI.p1 { border-color: #ff6b6b; }
        .playerUI.p2 { border-color: #4ecdc4; }
        .playerName {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        .healthBar {
            width: 150px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #555;
        }
        .healthFill { height: 100%; transition: width 0.3s; }
        .healthFill.p1 { background: linear-gradient(90deg, #ff6b6b, #ee5a5a); }
        .healthFill.p2 { background: linear-gradient(90deg, #4ecdc4, #44b3ab); }
        #startScreen, #mapSelectScreen, #charSelectScreen, #winnerScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #mapSelectScreen, #charSelectScreen { display: none; }
        h1 {
            color: #e94560;
            font-size: 42px;
            text-shadow: 3px 3px 0 #0f3460, -1px -1px 0 #fff;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        h2 {
            color: #4ecdc4;
            font-size: 28px;
            margin-bottom: 20px;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        input[type="text"] {
            padding: 12px 20px;
            font-size: 18px;
            border: 3px solid #e94560;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 8px;
            width: 280px;
        }
        button, .mapBtn, .charBtn {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            margin: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        button:hover, .mapBtn:hover, .charBtn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(233, 69, 96, 0.6); }
        .mapBtn.selected, .charBtn.selected { border: 3px solid #4ecdc4; box-shadow: 0 0 20px #4ecdc4; }
        .mapGrid, .charGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px;
            max-width: 600px;
        }
        .mapBtn, .charBtn {
            width: 180px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .mapBtn .preview {
            width: 160px;
            height: 50px;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .charBtn .charIcon {
            font-size: 32px;
            margin-bottom: 5px;
        }
        #controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 13px;
            text-align: center;
        }
        .controlKey {
            display: inline-block;
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 3px;
            color: #fff;
        }
        #winnerScreen { display: none; z-index: 200; }
        #winnerText {
            color: #ffd700;
            font-size: 56px;
            text-shadow: 4px 4px 0 #ff6b6b;
            animation: winnerPulse 1s infinite;
            text-align: center;
        }
        @keyframes winnerPulse {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }
        .hidden { display: none !important; }
        .featureList {
            color: #aaa;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="ui">
            <div class="playerUI p1">
                <div class="playerName" id="p1Name">Player 1</div>
                <div class="healthBar"><div class="healthFill p1" id="p1Health" style="width: 100%;"></div></div>
            </div>
            <div class="playerUI p2">
                <div class="playerName" id="p2Name">Player 2</div>
                <div class="healthBar"><div class="healthFill p2" id="p2Health" style="width: 100%;"></div></div>
            </div>
        </div>
        
        <div id="startScreen">
            <h1>PIXEL SMASH</h1>
            <input type="text" id="p1Input" placeholder="Player 1 Name" maxlength="12" value="">
            <input type="text" id="p2Input" placeholder="Player 2 Name" maxlength="12" value="">
            <button id="startBtn">SELECT CHARACTERS</button>
            <div id="controls">
                <div><span class="controlKey">A/D</span> P1 Move | <span class="controlKey">W</span> Jump | <span class="controlKey">S</span> Attack</div>
                <div style="margin-top: 8px;"><span class="controlKey">←/→</span> P2 Move | <span class="controlKey">↑</span> Jump | <span class="controlKey">↓</span> Attack</div>
            </div>
        </div>
        
        <div id="charSelectScreen">
            <h2>SELECT CHARACTER</h2>
            <div class="charGrid" id="charGrid"></div>
            <button id="charNextBtn" disabled>NEXT: SELECT MAP</button>
        </div>
        
        <div id="mapSelectScreen">
            <h2>SELECT MAP</h2>
            <div class="mapGrid" id="mapGrid"></div>
            <button id="mapStartBtn" disabled>START GAME</button>
        </div>
        
        <div id="winnerScreen">
            <div id="winnerText"></div>
            <button id="resetBtn">PLAY AGAIN</button>
        </div>
    </div>
