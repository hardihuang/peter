<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter's Repository | Friday's Code Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #238636;
            --purple: #a371f7;
            --pink: #f778ba;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 80px 20px;
            text-align: center;
            position: relative;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(88, 166, 255, 0.1) 0%, transparent 50%);
        }
        
        .header-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header h1 {
            font-size: 4em;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--purple) 50%, var(--pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header .subtitle {
            font-size: 1.3em;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 30px;
        }
        
        .github-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .github-btn:hover {
            background: var(--border-color);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .stats-section {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 50px 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .stat-item {
            text-align: center;
            padding: 25px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .stat-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        .category {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 30px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .category:hover {
            border-color: var(--accent);
        }
        
        .category-header {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            padding: 25px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .category-icon {
            font-size: 2em;
        }
        
        .category-title {
            font-size: 1.4em;
            font-weight: 600;
        }
        
        .category-count {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: auto;
        }
        
        .file-list { list-style: none; }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }
        
        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background: var(--bg-tertiary); }
        
        .file-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: 10px;
            margin-right: 18px;
            font-size: 1.4em;
            border: 1px solid var(--border-color);
        }
        
        .file-info { flex: 1; }
        
        .file-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95em;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        
        .file-name:hover { text-decoration: underline; }
        
        .file-desc {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 4px;
        }
        
        .file-meta {
            display: flex;
            gap: 15px;
            color: var(--text-secondary);
            font-size: 0.8em;
        }
        
        .footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 50px 20px;
            text-align: center;
        }
        
        .footer-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            margin: 0 auto 20px;
        }
        
        .footer-text {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2.5em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .file-meta { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>📦 Peter's Repository</h1>
            <p class="
