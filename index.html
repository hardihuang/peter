<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 800px; height: 480px; overflow: hidden; background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 11px; }
        .container { width: 800px; height: 480px; display: grid; grid-template-rows: 50px 1fr 40px; padding: 10px; gap: 8px; }
        .header { border: 1px solid #0f0; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .friday-title { font-size: 22px; font-weight: bold; letter-spacing: 6px; text-shadow: 0 0 10px #0f0; }
        .subtitle { font-size: 8px; color: #0a0; margin-top: 2px; }
        .datetime { display: flex; gap: 8px; }
        .datetime span { border: 1px solid #0f0; padding: 3px 8px; font-size: 11px; }
        .main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .panel { border: 1px solid #0f0; padding: 8px; }
        .empty-panel { display: flex; align-items: center; justify-content: center; height: 120px; color: #050; font-size: 9px; }
        .panel-title { font-size: 10px; border-bottom: 1px solid #0f0; padding-bottom: 4px; margin-bottom: 8px; }
        .panel-title::before { content: '> '; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .status-item { border: 1px solid #050; padding: 5px; background: rgba(0,50,0,0.2); }
        .status-label { font-size: 8px; color: #0a0; }
        .status-value { font-size: 10px; color: #0f0; }
        .agent-card { border: 1px solid #050; padding: 6px; margin-bottom: 6px; }
        .agent-name { font-size: 10px; }
        .agent-detail { font-size: 8px; color: #0a0; display: flex; justify-content: space-between; }
        .subagent-list { display: flex; flex-direction: column; gap: 4px; }
        .subagent-item { display: flex; align-items: center; gap: 6px; border: 1px solid #030; padding: 4px 6px; cursor: pointer; }
        .subagent-item:hover { border-color: #0f0; background: rgba(0,255,0,0.1); }
        .subagent-icon { width: 16px; height: 16px; border: 1px solid #0f0; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .subagent-name { font-size: 9px; }
        .subagent-task { font-size: 7px; color: #050; }
        .subagent-status { width: 4px; height: 4px; border-radius: 50%; }
        .subagent-status.running { background: #0f0; }
        .subagent-status.idle { background: #050; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .app-item { aspect-ratio: 1; border: 1px solid #050; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .app-item:hover { border-color: #0f0; background: rgba(0,255,0,0.1); }
        .app-icon { font-size: 16px; margin-bottom: 2px; }
        .app-name { font-size: 7px; text-align: center; }
        .bottom { display: flex; gap: 8px; }
        .btn { flex: 1; border: 1px solid #0f0; padding: 8px; text-align: center; cursor: pointer; font-size: 10px; }
        .btn:hover { background: rgba(0,255,0,0.1); }
        .cursor { display: inline-block; width: 8px; height: 14px; background: #0f0; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.3); animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(480px); } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="header">
            <div>
                <div class="friday-title" id="fridayText"></div>
                <div class="subtitle" id="subText"></div>
            </div>
            <div class="datetime">
                <span id="time">--:--:--</span>
                <span id="date">----/--/--</span>
            </div>
        </div>
        <div class="main">
            <div class="panel">
                <div class="panel-title">SERVER_STATUS</div>
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">PUBLIC_IP</div><div class="status-value">121.41.65.124</div></div>
                    <div class="status-item"><div class="status-label">UPTIME</div><div class="status-value" id="uptime">--</div></div>
                    <div class="status-item"><div class="status-label">CPU_LOAD</div><div class="status-value" id="cpu">--</div></div>
                    <div class="status-item"><div class="status-label">MEMORY</div><div class="status-value" id="mem">--</div></div>
                    <div class="status-item"><div class="status-label">GATEWAY</div><div class="status-value">ONLINE</div></div>
                    <div class="status-item"><div class="status-label">API</div><div class="status-value">ACTIVE</div></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">AGENT_STATUS</div>
                <div class="agent-card">
                    <div class="agent-name">Friday</div>
                    <div class="agent-detail"><span>Model: kimi-k2.5</span><span>v2.2.1</span></div>
                </div>
                <div class="subagent-list">
                    <div class="subagent-item" onclick="alert('Coder agent')">
                        <div class="subagent-icon">C</div>
                        <div class="subagent-info"><div class="subagent-name">Coder</div><div class="subagent-task">Idle</div></div>
                        <div class="subagent-status idle"></div>
                    </div>
                    <div class="subagent-item" onclick="alert('Browser agent')">
                        <div class="subagent-icon">B</div>
                        <div class="subagent-info"><div class="subagent-name">Browser</div><div class="subagent-task">Active</div></div>
                        <div class="subagent-status running"></div>
                    </div>
                    <div class="subagent-item" onclick="alert('Research agent')">
                        <div class="subagent-icon">R</div>
                        <div class="subagent-info"><div class="subagent-name">Research</div><div class="subagent-task">Idle</div></div>
                        <div class="subagent-status idle"></div>
                    </div>
                    <div class="subagent-item" onclick="alert('Git agent')">
                        <div class="subagent-icon">G</div>
                        <div class="subagent-info"><div class="subagent-name">Git</div><div class="subagent-task">Idle</div></div>
                        <div class="subagent-status idle"></div>
                    </div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">APPLICATIONS</div>
                <div class="app-grid">
                    <div class="app-item" onclick="window.location.href='settings.html'">
                        <div class="app-icon">⚙</div>
                        <div class="app-name">SETTINGS</div>
                    </div>
                    <div class="app-item" onclick="window.location.href='pomodoro.html'">
                        <div class="app-icon">🍅</div>
                        <div class="app-name">POMODORO</div>
                    </div>
                    <div class="app-item" onclick="window.location.href='calculator.html'">
                        <div class="app-icon">🧮</div>
                        <div class="app-name">CALC</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom">
            <div class="btn" onclick="alert('Terminal')">TERMINAL</div>
            <div class="btn" onclick="alert('Files')">FILES</div>
            <div class="btn" onclick="alert('Logs')">LOGS</div>
            <div class="btn" onclick="alert('Restart')">RESTART</div>
            <div class="btn" onclick="alert('Status')">STATUS</div>
        </div>
    </div>
    <script>
        // Typing animation
        const fridayText = "F.R.I.D.A.Y.";
        const subText = "Female Replacement Intelligent Digital Assistant Youth";
        let i = 0, j = 0;
        
        function typeFriday() {
            if (i < fridayText.length) {
                document.getElementById('fridayText').innerHTML = fridayText.substring(0, i+1) + '<span class="cursor"></span>';
                i++;
                setTimeout(typeFriday, 80);
            } else {
                document.getElementById('fridayText').innerHTML = fridayText;
                setTimeout(typeSub, 200);
            }
        }
        
        function typeSub() {
            if (j < subText.length) {
                document.getElementById('subText').innerHTML = subText.substring(0, j+1) + '<span class="cursor"></span>';
                j++;
                setTimeout(typeSub, 30);
            } else {
                document.getElementById('subText').innerHTML = subText;
            }
        }
        
        // Time update
        function updateTime() {
            const now = new Date();
            const cst = new Date(now.toLocaleString('en-US', {timeZone: 'Asia/Shanghai'}));
            document.getElementById('time').textContent = cst.toLocaleTimeString('en-US', {hour12: false});
            document.getElementById('date').textContent = cst.toLocaleDateString('zh-CN');
        }
        
        // Simulated server stats (would be real in production)
        function updateStats() {
            document.getElementById('cpu').textContent = (Math.random() * 10 + 2).toFixed(1) + '%';
            document.getElementById('mem').textContent = '1.' + Math.floor(Math.random() * 3 + 4) + 'Gi/1.8Gi';
            const days = Math.floor(Math.random() * 5 + 2);
            document.getElementById('uptime').textContent = days + 'd ' + Math.floor(Math.random() * 24) + 'h';
        }
        
        // Load brightness setting from localStorage
        const savedBrightness = localStorage.getItem('brightness');
        if (savedBrightness !== null) {
            const brightnessVal = 0.3 + (parseInt(savedBrightness) / 100) * 0.7;
            document.body.style.filter = `brightness(${brightnessVal})`;
        }
        
        typeFriday();
        updateTime();
        updateStats();
        setInterval(updateTime, 1000);
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
