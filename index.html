<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 800px; height: 480px; overflow: hidden; background: #0a0e1a; color: #00d4ff; font-family: 'Courier New', monospace; font-size: 11px; }
        .container { width: 800px; height: 480px; display: grid; grid-template-rows: 50px 1fr 40px; padding: 10px; gap: 8px; }
        .header { border: 1px solid #00d4ff; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
        .friday-title { font-size: 22px; font-weight: bold; letter-spacing: 6px; text-shadow: 0 0 15px #00d4ff, 0 0 30px rgba(0,212,255,0.5); }
        .subtitle { font-size: 8px; color: #0088aa; margin-top: 2px; }
        .datetime { display: flex; gap: 8px; }
        .datetime span { border: 1px solid #00d4ff; padding: 3px 8px; font-size: 11px; }
        .main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .panel { border: 1px solid #00d4ff; padding: 8px; }
        .panel-title { font-size: 10px; border-bottom: 1px solid #00d4ff; padding-bottom: 4px; margin-bottom: 8px; }
        .panel-title::before { content: '> '; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .status-item { border: 1px solid #006688; padding: 5px; background: rgba(0,212,255,0.05); }
        .status-label { font-size: 8px; color: #0088aa; }
        .status-value { font-size: 10px; color: #00d4ff; }
        .agent-card { border: 1px solid #006688; padding: 6px; margin-bottom: 6px; }
        .agent-name { font-size: 10px; }
        .agent-detail { font-size: 8px; color: #0088aa; display: flex; justify-content: space-between; }
        .subagent-list { display: flex; flex-direction: column; gap: 4px; }
        .subagent-item { display: flex; align-items: center; gap: 6px; border: 1px solid #004455; padding: 4px 6px; cursor: pointer; }
        .subagent-item:hover { border-color: #00d4ff; background: rgba(0,212,255,0.15); }
        .subagent-icon { width: 16px; height: 16px; border: 1px solid #00d4ff; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .subagent-name { font-size: 9px; }
        .subagent-task { font-size: 7px; color: #006688; }
        .subagent-status { width: 4px; height: 4px; border-radius: 50%; }
        .subagent-status.running { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }
        .subagent-status.idle { background: #006688; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .app-item { aspect-ratio: 1; border: 1px solid #006688; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .app-item:hover { border-color: #00d4ff; background: rgba(0,212,255,0.15); }
        .app-icon { font-size: 16px; margin-bottom: 2px; }
        .app-name { font-size: 7px; text-align: center; }
        .bottom { display: flex; gap: 8px; }
        .btn { flex: 1; border: 1px solid #00d4ff; padding: 8px; text-align: center; cursor: pointer; font-size: 10px; }
        .btn:hover { background: rgba(0,212,255,0.15); }
        .cursor { display: inline-block; width: 8px; height: 14px; background: #00d4ff; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,212,255,0.4); animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(480px); } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <div class="header">
            <div>
                <div class="friday-title" id="fridayText"></div>
                <div class="subtitle" id="subText"></div>
            </div>
            <div class="datetime">
                <span id="time">--:--:--</span>
                <span id="date">----/--/--</span>
            </div>
        </div>
        <div class="main">
            <div class="panel">
                <div class="panel-title">SERVER_STATUS</div>
                <div class="status-grid">
                    <div class="status-item"><div class="status-label">PUBLIC_IP</div><div class="status-value">121.41.65.124</div></div>
                    <div class="status-item"><div class="status-label">UPTIME</div><div class="status-value" id="uptime">--</div></div>
                    <div class="status-item"><div class="status-label">CPU_LOAD</div><div class="status-value" id="cpu">--</div></div>
                    <div class="status-item"><div class="status-label">MEMORY</div><div class="status-value" id="mem">--</div></div>
                    <div class="status-item"><div class="status-label">GATEWAY</div><div class="status-value">ONLINE</div></div>
                    <div class="status-item"><div class="status-label">API</div><div class="status-value">ACTIVE</div></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">AGENT_STATUS</div>
                <div class="agent-card">
                    <div class="agent-name">Friday</div>
                    <div class="agent-detail"><span>Model: kimi-k2.5</span><span>v2.2.1</span></div>
                </div>
                <div class="subagent-list">
                    <div class="subagent-item" onclick="alert('Coder agent')">
                        <div class="subagent-icon">C</div>
                        <div class="subagent-info"><div class="subagent-name">Coder</div><div class="subagent-task">Idle</div></div>
                        <div class="subagent-status idle"></div>
                    </div>
                    <div class="subagent-item" onclick="alert('Browser agent')">
                        <div class="subagent-icon">B</div>
                        <div class="subagent-info"><div class="subagent-name">Browser</div><div class="subagent-task">Active</div></div>
                        <div class="subagent-status running"></div>
                    </div>
                    <div class="subagent-item" onclick="alert('Research agent')">
                        <div class="subagent-icon">R</div>
                        <div class="subagent-info"><div class="subagent-name">Research</div><div class="subagent-task">Idle</div></div>
                        <div class="subagent-status idle"></div>
                    </div>
                    <div class="subagent-item" onclick="alert('Git agent')">
                        <div class="subagent-icon">G</div>
                        <div class="subagent-info"><div class="subagent-name">Git</div><div class="subagent-task">Idle</div></div>
                        <div class="subagent-status idle"></div>
                    </div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">APPLICATIONS</div>
                <div class="app-grid">
                    <div class="app-item" onclick="window.open('the-arena.html','_blank')">
                        <div class="app-icon">⚔</div>
                        <div class="app-name">ARENA</div>
                    </div>
                    <div class="app-item" onclick="window.open('pixel-smash.html','_blank')">
                        <div class="app-icon">👊</div>
                        <div class="app-name">SMASH</div>
                    </div>
                    <div class="app-item" onclick="window.open('snake.html','_blank')">
                        <div
