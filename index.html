<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>F.R.I.D.A.Y.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        @font-face {
            font-family: 'VT323';
            src: local('VT323'), local('Courier New');
        }
        
        body {
            width: 800px;
            height: 480px;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            color: #0f0;
            font-size: 11px;
            cursor: text;
        }
        
        /* CRT Effect */
        .crt::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
        }
        
        .container {
            width: 800px;
            height: 480px;
            display: grid;
            grid-template-rows: 55px 1fr 45px;
            padding: 10px;
            gap: 8px;
            position: relative;
        }
        
        /* Scanline animation */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(480px); }
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 0, 0.3);
            animation: scanline 4s linear infinite;
            pointer-events: none;
            z-index: 9998;
        }
        
        /* Header */
        .header {
            border: 1px solid #0f0;
            background: rgba(0, 255, 0, 0.05);
            padding: 6px 12px;
            position: relative;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .friday-title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
        }
        
        .subtitle {
            font-size: 9px;
            color: #0a0;
            letter-spacing: 1px;
        }
        
        .datetime {
            display: flex;
            gap: 10px;
            font-size: 11px;
        }
        
        .datetime span {
            border: 1px solid #0f0;
            padding: 3px 8px;
            background: rgba(0, 255, 0, 0.1);
        }
        
        /* Typing cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #0f0;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        /* Main Content */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            overflow: hidden;
        }
        
        .panel {
            border: 1px solid #0f0;
            background: rgba(0, 255, 0, 0.03);
            padding: 8px;
            overflow: hidden;
        }
        
        .panel-title {
            font-size: 10px;
            color: #0f0;
            margin-bottom: 6px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .panel-title::before {
            content: '> ';
        }
        
        /* Server Status */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        
        .status-item {
            border: 1px solid #050;
            padding: 5px;
            background: rgba(0, 50, 0, 0.3);
        }
        
        .status-label {
            font-size: 8px;
            color: #0a0;
            margin-bottom: 2px;
        }
        
        .status-value {
            font-size: 10px;
            color: #0f0;
        }
        
        .status-value.online { color: #0f0; }
        .status-value.warn { color: #ff0; }
        .status-value.offline { color: #f00; }
        
        /* Agent Status */
        .agent-card {
            border: 1px solid #050;
            padding: 6px;
            margin-bottom: 5px;
            background: rgba(0, 30, 0, 0.3);
        }
        
        .agent-name {
            font-size: 10px;
            color: #0f0;
            margin-bottom: 3px;
        }
        
        .agent-detail {
            font-size: 8px;
            color: #0a0;
            display: flex;
            justify-content: space-between;
        }
        
        .agent-status {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #0f0;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Subagents */
        .subagent-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .subagent-item {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #030;
            padding: 4px 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 20, 0, 0.3);
        }
        
        .subagent-item:hover, .subagent-item:active {
            border-color: #0f0;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .subagent-icon {
            width: 16px;
            height: 16px;
            border: 1px solid #0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .subagent-info {
            flex: 1;
        }
        
        .subagent-name {
            font-size: 9px;
            color: #0f0;
        }
        
        .subagent-task {
            font-size: 7px;
            color: #050;
        }
        
        .subagent-status {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }
        
        .subagent-status.running { background: #0f0; box-shadow: 0 0 4px #0f0; }
        .subagent-status.idle { background: #050; }
        .subagent-status.error { background: #f00; }
        
        /* Apps */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        
        .app-item {
            aspect-ratio: 1;
            border: 1px solid #050;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 30, 0, 0.3);
            padding: 4px;
        }
        
        .app-item:hover, .app
